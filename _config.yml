title: "Bale Tech Docs"
description: "Catatan & Referensi Cepat Python, PHP, JavaScript, CSS — untuk Pemula Indonesia"
url: "https://balenetizien.github.io"
baseurl: "/bale-tech-docs"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

# Just the Docs settings
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_sort: order

permalink: pretty

aux_links:
  "🏠 Kembali ke Blog":
    - "https://balenetizien.github.io"

aux_links_new_tab: true

footer_content: "© 2025 <a href='https://balenetizien.github.io'>Bale Tech</a> — Dibuat dengan ❤️ untuk pemula Indonesia."

back_to_top: true
back_to_top_text: "Kembali ke atas"

ga_tracking:
# ga_tracking: "G-XXXXXXXXXX"  # Isi dengan Google Analytics ID kamu

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
